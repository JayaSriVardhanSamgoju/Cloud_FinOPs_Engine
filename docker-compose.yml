version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: cloudpulse_postgres

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: cloudpulse_db

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: always

  pgadmin:
    image: dpage/pgadmin4
    container_name: cloudpulse_pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cloudpulse.ai
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - postgres

    restart: always

  redis:
    image: redis:7
    container_name: cloudpulse_redis

    ports:
      - "6379:6379"

    restart: always

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    container_name: cloudpulse_mlflow

    command: >
      mlflow server --host 0.0.0.0 --port 5000

    ports:
      - "5001:5000"

    restart: always

  dashboard:
    build: .

    container_name: cloudpulse_dashboard

    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0

    ports:
      - "8501:8501"

    environment:
      - DB_HOST=postgres

    depends_on:
      - postgres

    restart: always

volumes:
  postgres_data:
