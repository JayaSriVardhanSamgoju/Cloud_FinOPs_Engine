version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: cloudpulse_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: cloudpulse_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: cloudpulse_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cloudpulse.ai
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"

  redis:
    image: redis:7
    container_name: cloudpulse_redis
    restart: always
    ports:
      - "6379:6379"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.2
    container_name: cloudpulse_mlflow
    restart: always
    ports:
      - "5001:5000"
    command: >
      mlflow server --host 0.0.0.0 --port 5000

volumes:
  postgres_data:
