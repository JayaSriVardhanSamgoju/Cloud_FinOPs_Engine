apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudpulse-fastapi
  namespace: cloudpulse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudpulse-fastapi
  template:
    metadata:
      labels:
        app: cloudpulse-fastapi
    spec:
      containers:
      - name: fastapi
        image: cloudpulse-fastapi:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: cloudpulse-config
        command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
---
apiVersion: v1
kind: Service
metadata:
  name: cloudpulse-fastapi
  namespace: cloudpulse
spec:
  ports:
  - port: 8000
  selector:
    app: cloudpulse-fastapi
