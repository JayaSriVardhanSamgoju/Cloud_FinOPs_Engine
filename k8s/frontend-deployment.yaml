apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudpulse-frontend
  namespace: cloudpulse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudpulse-frontend
  template:
    metadata:
      labels:
        app: cloudpulse-frontend
    spec:
      containers:
      - name: frontend
        image: cloudpulse-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: cloudpulse-frontend
  namespace: cloudpulse
spec:
  ports:
  - port: 80
  selector:
    app: cloudpulse-frontend
