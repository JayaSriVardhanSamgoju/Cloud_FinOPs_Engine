apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudpulse-ingress
  namespace: cloudpulse
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
  - host: cloudpulse.local
    http:
      paths:
      - path: /api/(.*)
        pathType: Prefix
        backend:
          service:
            name: cloudpulse-fastapi
            port:
              number: 8000
      - path: /(.*)
        pathType: Prefix
        backend:
          service:
            name: cloudpulse-frontend
            port:
              number: 80
